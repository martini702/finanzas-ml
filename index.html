<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Finanzas App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111111">

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
background:#f2f2f2;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
display:flex;
justify-content:center;
transition:0.3s;
}
.app{
width:390px;
min-height:100vh;
background:white;
padding:15px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}
.card{
background:#fafafa;
padding:12px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
overflow-x:auto;
}
button{
background:#111;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
margin-top:5px;
cursor:pointer;
}
button.secondary{
background:#e0e0e0;
color:black;
}
input,select{
width:100%;
padding:8px;
margin-top:5px;
border-radius:8px;
border:1px solid #ddd;
}
table{
width:100%;
border-collapse:collapse;
}
td,th{
padding:6px;
border-bottom:1px solid #e6e6e6;
font-size:14px;
text-align:left;
}
.small-actions{
display:flex;
gap:5px;
}
.small-actions button{
padding:5px 8px;
margin-top:0;
}
.mini-input{
min-width:90px;
}
.month-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}
.month-btn{
margin-top:0;
padding:10px 6px;
font-size:13px;
background:#efefef;
color:#111;
}
.month-btn.active{
background:#111;
color:#fff;
font-weight:600;
}
body.dark{background:#121212;color:white;}
body.dark .app{background:#1e1e1e;box-shadow:none;}
body.dark .card{background:#2a2a2a;box-shadow:none;}
body.dark input,body.dark select{background:#333;color:white;border:1px solid #444;}
body.dark button{background:#444;color:white;}
body.dark button.secondary{background:#666;color:white;}
body.dark td,body.dark th{border-color:#3b3b3b;}
body.dark .month-btn{background:#3a3a3a;color:#fff;}
body.dark .month-btn.active{background:#fff;color:#111;}
</style>
</head>

<body>

<div class="app">

<div style="text-align:right;margin-bottom:10px;">
<button id="toggleDark">🌙</button>
</div>

<h2>Mis Finanzas</h2>

<div class="card">
<button onclick="cambiarAnio(-1)">◀</button>
<strong id="anioActual"></strong>
<button onclick="cambiarAnio(1)">▶</button>
</div>

<div class="card">
<h4>Mes</h4>
<div id="mesCalendario" class="month-grid"></div>
</div>

<div class="card">
<h4>Sueldo</h4>
<input id="sueldoInput" placeholder="Ingrese sueldo">
<button onclick="guardarSueldo()">Guardar mes actual</button>
<button class="secondary" onclick="eliminarSueldo()">Eliminar mes actual</button>
</div>

<div class="card">
<h4>Ahorro</h4>
<input id="ahorroInput" placeholder="Ingrese ahorro">
<button onclick="guardarAhorro()">Guardar</button>
</div>

<div class="card">
<h4>Agregar Gasto</h4>
<input id="descInput" placeholder="Descripción">
<input id="montoInput" placeholder="Monto">
<input id="cuotasInput" placeholder="Meses cuotas">
<button onclick="agregarGasto()">Agregar</button>
<button onclick="agregarCuotas()">En cuotas</button>
<button class="secondary" onclick="aplicarATodos()">Aplicar a todos</button>
</div>

<div class="card">
<h4>Gastos del mes (editables)</h4>
<table id="tablaGastos"></table>
</div>

<div class="card">
<p>Total Gastos: <span id="totalGastos"></span></p>
<p>Ahorro: <span id="totalAhorro"></span></p>
<p>Disponible: <span id="disponible"></span></p>
</div>

<div class="card">
<h4>Proyección anual editable</h4>
<table id="tablaProyeccion"></table>
<button onclick="guardarProyeccionAnual()">Guardar proyección anual</button>
</div>

<div class="card">
<canvas id="graficoAhorro"></canvas>
</div>

</div>

<script>

const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
let anio=new Date().getFullYear();
let mesSeleccionado=new Date().getMonth();
let datos=JSON.parse(localStorage.getItem("finanzas"))||{};

function guardarStorage(){localStorage.setItem("finanzas",JSON.stringify(datos));}

const formatoMoneda=new Intl.NumberFormat("es-CL",{style:"currency",currency:"CLP",minimumFractionDigits:0});
function formatoCL(v){return formatoMoneda.format(Number(v||0));}
function limpiarNumero(valor){return Number(String(valor).replace(/\D/g,""))||0;}
function escapeHTML(valor){
return String(valor||"").replace(/[&<>\"']/g,(m)=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
}

function limpiarFormularioGasto(){
  descInput.value="";
  montoInput.value="";
  cuotasInput.value="";
  descInput.focus();
}

function inicializarAnio(a){
if(!datos[a]){
datos[a]={};
for(let i=0;i<12;i++){datos[a][i]={sueldo:0,ahorro:0,gastos:[]};}
}
}

function cambiarAnio(d){anio+=d;inicializarAnio(anio);render();}
function getMes(){return mesSeleccionado;}

function seleccionarMes(mes){
mesSeleccionado=mes;
render();
}

function guardarSueldo(){
let m=getMes();
datos[anio][m].sueldo=limpiarNumero(sueldoInput.value);
guardarStorage();
render();
}

function eliminarSueldo(){
let m=getMes();
datos[anio][m].sueldo=0;
guardarStorage();
render();
}

function guardarAhorro(){
let m=getMes();
datos[anio][m].ahorro=limpiarNumero(ahorroInput.value);
guardarStorage();
render();
}

function agregarGasto(){
let m=getMes();
let desc=descInput.value.trim();
let monto=limpiarNumero(montoInput.value);
if(!desc||!monto)return;

datos[anio][m].gastos.push({id:Date.now(),desc,monto});
guardarStorage();

limpiarFormularioGasto();
render();
}

function editarGasto(id){
let m=getMes();
let desc=document.getElementById(`desc-${id}`)?.value.trim();
let monto=limpiarNumero(document.getElementById(`monto-${id}`)?.value||0);
if(!desc||!monto)return;

let gasto=datos[anio][m].gastos.find(g=>g.id===id);
if(!gasto)return;
gasto.desc=desc;
gasto.monto=monto;
guardarStorage();
render();
}

function eliminarGasto(id){
let m=getMes();
datos[anio][m].gastos=datos[anio][m].gastos.filter(g=>g.id!==id);
guardarStorage();
render();
}

function agregarCuotas(){
let mInicial=getMes();
let desc=descInput.value.trim();
let monto=limpiarNumero(montoInput.value);
let cuotas=Number(cuotasInput.value);
if(!desc||!monto||!cuotas)return;

let aTemp=anio,mTemp=mInicial;

for(let i=0;i<cuotas;i++){
inicializarAnio(aTemp);
datos[aTemp][mTemp].gastos.push({id:Date.now()+i,desc,monto});
mTemp++;
if(mTemp>11){mTemp=0;aTemp++;}
}

guardarStorage();

limpiarFormularioGasto();
render();
}

function aplicarATodos(){
let desc=descInput.value.trim();
let monto=limpiarNumero(montoInput.value);
if(!desc||!monto)return;

for(let i=0;i<12;i++){
datos[anio][i].gastos.push({id:Date.now()+i,desc,monto});
}

guardarStorage();

limpiarFormularioGasto();
render();
}

function guardarProyeccionAnual(){
for(let i=0;i<12;i++){
let sueldoInputMes=document.getElementById(`proy-sueldo-${i}`);
let ahorroInputMes=document.getElementById(`proy-ahorro-${i}`);
if(!sueldoInputMes||!ahorroInputMes) continue;
datos[anio][i].sueldo=limpiarNumero(sueldoInputMes.value);
datos[anio][i].ahorro=limpiarNumero(ahorroInputMes.value);
}
guardarStorage();
render();
}

function renderGastos(d){
let total=0;
tablaGastos.innerHTML="";
if(!d.gastos.length){
  tablaGastos.innerHTML="<tr><td>No hay gastos para este mes.</td></tr>";
  return total;
}

tablaGastos.innerHTML="<tr><th>Descripción</th><th>Monto</th><th>Acciones</th></tr>";
d.gastos.forEach(g=>{
total+=g.monto;
tablaGastos.innerHTML+=`<tr>
<td><input id="desc-${g.id}" class="mini-input" value="${escapeHTML(g.desc)}"></td>
<td><input id="monto-${g.id}" class="mini-input" value="${formatoCL(g.monto)}"></td>
<td>
  <div class="small-actions">
    <button onclick="editarGasto(${g.id})">Guardar</button>
    <button class="secondary" onclick="eliminarGasto(${g.id})">Eliminar</button>
  </div>
</td>
</tr>`;
});
return total;
}

function renderProyeccionAnual(){
let html="<tr><th>Mes</th><th>Sueldo</th><th>Ahorro</th><th>Gastos</th><th>Disponible</th></tr>";
for(let i=0;i<12;i++){
let d=datos[anio][i];
let gastosMes=d.gastos.reduce((acc,g)=>acc+g.monto,0);
let disponibleMes=(d.sueldo||0)-gastosMes-(d.ahorro||0);
html+=`<tr>
<td>${meses[i]}</td>
<td><input id="proy-sueldo-${i}" class="mini-input" value="${formatoCL(d.sueldo)}"></td>
<td><input id="proy-ahorro-${i}" class="mini-input" value="${formatoCL(d.ahorro)}"></td>
<td>${formatoCL(gastosMes)}</td>
<td>${formatoCL(disponibleMes)}</td>
</tr>`;
}
tablaProyeccion.innerHTML=html;
}

function render(){
inicializarAnio(anio);
anioActual.innerText=anio;
renderMesCalendario();
let m=getMes();
let d=datos[anio][m];

sueldoInput.value=d.sueldo?formatoCL(d.sueldo):"";
ahorroInput.value=d.ahorro?formatoCL(d.ahorro):"";

let total=renderGastos(d);
let disp=(d.sueldo||0)-total-(d.ahorro||0);

totalGastos.innerText=formatoCL(total);
totalAhorro.innerText=formatoCL(d.ahorro);
disponible.innerText=formatoCL(disp);

renderProyeccionAnual();
actualizarGrafico();
}

let ctx=document.getElementById("graficoAhorro").getContext("2d");
let grafico=new Chart(ctx,{
type:"bar",
data:{labels:meses,datasets:[{label:"Ahorro Mensual",data:Array(12).fill(0)}]},
options:{responsive:true}
});

function actualizarGrafico(){
let ahorroMensual=meses.map((_,i)=>datos[anio][i]?.ahorro||0);
grafico.data.datasets[0].data=ahorroMensual;
grafico.update();
}

function renderMesCalendario(){
mesCalendario.innerHTML="";
meses.forEach((mes,i)=>{
let btn=document.createElement("button");
btn.className=`month-btn ${i===mesSeleccionado?"active":""}`;
btn.textContent=mes;
btn.onclick=()=>seleccionarMes(i);
mesCalendario.appendChild(btn);
});
}

function iniciar(){
inicializarAnio(anio);
render();
}

iniciar();

document.getElementById("toggleDark").addEventListener("click",()=>{
document.body.classList.toggle("dark");
});

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/service-worker.js')
.then(()=>console.log("Service Worker registrado"))
.catch(err=>console.log("Error SW:",err));
}

</script>

</body>
</html>
